<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <h2 class="store-title">My Account</h2>
    
    <div class="cart-container">
        <div class="section">
            <h3>❤️ My Favorites</h3>
            <div id="favoritesList"></div>
        </div>

        <div class="section">
            <h3>📦 Order History</h3>
            <div id="orderHistory"></div>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script>
        // Additional small script to render favorites on this page
        let favs = JSON.parse(localStorage.getItem("favorites")) || [];
        let favDiv = document.getElementById("favoritesList");
        favs.forEach(f => {
            favDiv.innerHTML += `<p><b>${f.name}</b> - ₹${f.price}</p>`;
        });
    </script>
</body>
</html>
