<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Clothing Store</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070');
            background-size: cover; background-position: center;
        }
.auth-card {
    /* 1. Define the tint (white with 80% opacity) and the image URL */
    background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), 
                url('assets/images/roadster01.png'); 
    
    /* 2. Styling the image */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    /* 3. Existing layout */
    padding: 80px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    text-align: center;
    transition: 0.5s ease;
}

        h2 { font-size: 28px; color: #1a1a1a; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border: 2px solid #eee; border-radius: 10px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #2563eb; }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: #2563eb; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #1d4ed8; }

        .toggle-text { margin-top: 20px; font-size: 14px; color: #555; }
        .toggle-text b { color: #2563eb; cursor: pointer; }

        .hidden { display: none; }
        .form-content { animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="greet">Welcome</h2>
        <p>Login to start your shopping journey.</p>

        <form id="loginForm" class="form-content" onsubmit="handleLogin(event)">
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
            <div class="toggle-text">
                Don't have an account? <b onclick="toggleForm()">Sign Up</b>
            </div>
        </form>

        <form id="signupForm" class="form-content hidden" onsubmit="handleSignup(event)">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Create Password" required>
            <button type="submit" style="background: #059669;">Create Account</button>
            <div class="toggle-text">
                Already have an account? <b onclick="toggleForm()">Sign In</b>
            </div>
        </form>
    </div>

<script>
        // Get references to elements
        const greet = document.getElementById('greet');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        // Function to handle toggle and dynamic greeting
        function toggleForm() {
            // Toggle the 'hidden' class
            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');

            // Logic: If loginForm contains 'hidden', we are on the Signup page
            // Otherwise, we are on the Login page
            if (loginForm.classList.contains('hidden')) {
                greet.innerText = "Welcome ✨";
            } else {
                greet.innerText = "Welcome Back 👋";
            }
        }

        // Handle Form Submission
        function handleLogin(event) {
            event.preventDefault(); 
            // Add your real authentication logic here later
            alert("Login success! Redirecting...");
            window.location.href = 'pages/shop.html';
        }

        function handleSignup(event) {
            event.preventDefault();
            alert("Account created successfully! Welcome to our store.");
            // After signing up, switch back to login
            toggleForm();
        }
    </script>
</body>
</html>
